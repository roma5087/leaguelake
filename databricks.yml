bundle:
  name: leaguelake

include:
  - resources/*.yml

# Don't ship the raw data folder up with the bundle — the pipeline reads the
# Unity Catalog Volume, not these workspace files. Keeps deploys lean.
sync:
  exclude:
    - raw/**

targets:
  dev: 
    mode: development
    default: true
    workspace: 
      host: https://dbc-fc62342d-ea44.cloud.databricks.com