name: CI

# Test on every push/PR; deploy the Databricks bundle on push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize runs per ref so two quick pushes can't race a bundle deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- unit tests (no Databricks auth needed) ----
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -v

  # ---- deploy the bundle to Databricks (dev target) ----
  deploy:
    name: Deploy bundle (dev)
    needs: test                                   # only deploy if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: https://dbc-fc62342d-ea44.cloud.databricks.com   # not secret
    steps:
      - uses: actions/checkout@v4
      # pinned to a commit SHA (v1.7.0) so a compromised branch can't run in the token's job
      - uses: databricks/setup-cli@bc7e6aabb6006d8d1758bd25ee1a100935c9cb7c
      - name: Validate bundle
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}   # scoped to this step only
        run: databricks bundle validate -t dev
      - name: Deploy bundle
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy -t dev
